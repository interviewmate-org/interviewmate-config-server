name: Config Server Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:

    runs-on: ubuntu-latest

    steps:

      # -----------------------------
      # Checkout Repository
      # -----------------------------
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # -----------------------------
      # Read Snapshot Version
      # -----------------------------
      - name: Read Current Version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "CURRENT_VERSION=$VERSION" >> $GITHUB_ENV

          RELEASE_VERSION=${VERSION/-SNAPSHOT/}
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      # -----------------------------
      # Setup Java
      # -----------------------------
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      # -----------------------------
      # Maven Wrapper Permission
      # -----------------------------
      - name: Grant Execute Permission
        run: chmod +x mvnw

      # -----------------------------
      # Build Spring Boot Application
      # -----------------------------
      - name: Build Application
        run: |
          ./mvnw clean package \
          -Drevision=${{ env.RELEASE_VERSION }} \
          -DskipTests

      # -----------------------------
      # Login to GHCR
      # -----------------------------
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------
      # Build Docker Image
      # -----------------------------
      - name: Build Docker Image
        run: |
          docker build \
          -t ghcr.io/interviewmate-org/config-server:${{ env.RELEASE_VERSION }} .

      # -----------------------------
      # Push Docker Image
      # -----------------------------
      - name: Push Docker Image
        run: |
          docker push \
          ghcr.io/interviewmate-org/config-server:${{ env.RELEASE_VERSION }}
